{% extends 'base.html' %}

{% block content %}
<div class="container-fluid" style="min-height: 100vh; background: linear-gradient(145deg, #f4f6fa 0%, #e2e8f0 100%); padding: 2rem;">
    <div class="row justify-content-center">
        <div class="col-12 col-xl-11 p-0">
            <div class="card border-0 shadow-lg" style="border-radius: 20px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); overflow: hidden;">
                <!-- Header -->
                <div class="card-header bg-transparent border-0 py-3 px-6" style="background: linear-gradient(90deg, #4f46e5 0%, #7c3aed 100%);">
                    <h3 class="mb-0 fw-bold text-white" style="letter-spacing: 0.5px; font-family: 'Inter', sans-serif;">
                        Course Selection
                    </h3>
                </div>

                <!-- Body -->
                <div class="card-body p-3" style="max-height: 60vh; overflow-y: auto; scrollbar-width: thin; overflow-wrap: anywhere;">
                    <div class="list-group list-group-flush">
                        {% for cname, cols in courses.items() %}
                        <div class="list-group-item border-0 py-2 px-2 mb-1" style="background: rgba(249, 250, 251, 0.8); border-radius: 16px; transition: all 0.3s ease; backdrop-filter: blur(6px);">
                            <div class="row align-items-center g-4">
                                <div class="col-12 col-md-4">
                                    <h5 class="fw-medium mb-0 text-gray-900 text-center" style="font-family: 'Inter', sans-serif; font-size: 0.95rem;">
                                        {{ cname }}
                                    </h5>
                                </div>
                                <div class="col-12 col-md-8">
                                    <div class="d-flex flex-wrap gap-4">
                                        {% for col in cols %}
                                        <div class="form-check form-check-inline mb-0">
                                            <input class="form-check-input premium-checkbox" 
                                                   type="checkbox"
                                                   name="course_{{ cname }}"
                                                   id="course_{{ cname }}_{{ loop.index }}"
                                                   value="{{ col }}">
                                            <label class="form-check-label text-gray-700 fw-medium" 
                                                   for="course_{{ cname }}_{{ loop.index }}"
                                                   style="font-size: 0.85rem; font-family: 'Inter', sans-serif;">
                                                {{ col }}
                                            </label>
                                        </div>
                                        {% endfor %}
                                    </div>
                                </div>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>

                <!-- Footer -->
                <div class="card-footer bg-transparent border-top py-2 px-2" style="background: rgba(255, 255, 255, 0.9);">
                    <div class="d-flex flex-row justify-content-end flex-wrap gap-4">
                        <div class="d-flex gap-3">
                            <button class="btn btn-outline-indigo px-3 py-2" id="uploadBtn" style="border-radius: 10px; font-weight: 400; font-family: 'Inter', sans-serif;">
                                <i class="bi bi-upload me-2"></i>Upload Again
                            </button>
                            <button class="btn btn-indigo px-3 py-2" id="exportBtn" style="border-radius: 10px; font-weight: 500; font-family: 'Inter', sans-serif;">
                                <i class="bi bi-file-earmark-word me-2"></i>Export as DOCX
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    const file_id = '{{ file_id }}';
</script>
<script src="{{ url_for('static', filename='js/file.js') }}"></script>
{% endblock %}
